<svg width="1600" height="600"
xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="bg"
x1="0"
y1="0"
x2="1"
y2="1">

<stop offset="0%" stop-color="#5B0000"/>

<stop offset="50%" stop-color="#C62828"/>

<stop offset="100%" stop-color="#FF5722"/>

</linearGradient>


<radialGradient id="light">

<stop offset="0%" stop-color="#FFD54F"
stop-opacity=".45"/>

<stop offset="100%" stop-color="#FFD54F"
stop-opacity="0"/>

</radialGradient>


</defs>


<rect width="1600"
height="600"
fill="url(#bg)"/>


<circle cx="1300"
cy="100"
r="400"
fill="url(#light)"/>


<circle cx="200"
cy="500"
r="300"
fill="rgba(255,255,255,.08)"/>


</svg>
